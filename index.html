<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool@latest'></script>
    <link rel="icon" href="icon.png" type="image/x-icon">
    <title>@erased</title>
    <script>
        //"video" (video.mp4) or "black" (audio.mp3).
        const BACKGROUND_MODE = "black";
        const VIDEO_SRC = "video.mp4";

        let textElement = null;
        const texts = ["It was fun", "The light has dimmed", "There Are Federal Agents Outside My House", "- - - - - - - - -"];
        let textIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function startBackground() {
            const video = document.getElementById('backgroundVideo');
            const audio = document.getElementById('backgroundAudio');

            if (BACKGROUND_MODE === "black") {
                if (video) {
                    video.pause();
                    video.style.display = "none";
                    video.removeAttribute("src");
                    while (video.firstChild) video.removeChild(video.firstChild);
                    try { video.load(); } catch { }
                }

                if (audio) {
                    audio.loop = true;
                    audio.volume = 0.15;
                    audio.play().catch(() => { });
                }

                return;
            }

            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }

            if (video) {
                video.style.display = "";
                video.muted = false;
                video.volume = 0.05;
                if (!video.currentSrc) {
                    video.src = VIDEO_SRC;
                    try { video.load(); } catch { }
                }
                video.play().catch(() => { });
            }
        }

        function typeText() {
            if (!textElement) textElement = document.getElementById("typing-text");
            if (!textElement) return;

            const currentText = texts[textIndex];
            if (isDeleting) {
                textElement.textContent = currentText.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentText.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentText.length) {
                isDeleting = true;
                setTimeout(typeText, 6000);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                textIndex = (textIndex + 1) % texts.length;
                setTimeout(typeText, 1000);
            } else {
                setTimeout(typeText, 200);
            }
        }

        function removeOverlay() {
            const overlay = document.getElementById('overlay');
            if (overlay) overlay.style.display = 'none';
            startBackground();
            typeText();
        }

        (function () {
            const threshold = 160;
            let devtoolsOpen = false;

            function detectDevTools() {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;

                if (widthThreshold || heightThreshold) {
                    if (!devtoolsOpen) {
                        devtoolsOpen = true;
                        alert("Dev Tools are not allowed!");
                        window.location.href = "https://www.youtube.com/watch?v=H-fetNUKqDM";
                    }
                } else {
                    devtoolsOpen = false;
                }
            }

            setInterval(detectDevTools, 500);

            document.addEventListener("keydown", function (e) {
                if (e.key === "F12") {
                    e.preventDefault();
                    alert("X3 Sorry!");
                }

                if (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key.toUpperCase())) {
                    e.preventDefault();
                    alert("UwU Cant Do That Here!");
                }

                if (e.ctrlKey && e.key.toUpperCase() === "U") {
                    e.preventDefault();
                    alert(":3 What Are You Trying To Do?");
                }
            });
        })();
    </script>
    <script src='js/snow.js'></script>
    <script src='js/title.js'></script>
</head>

<body>
    <div class="overlay" id="overlay">
        <div class="proceed-button" onclick="removeOverlay()">>_<</div>
        </div>
        <video id="backgroundVideo" loop playsinline preload="none"></video>
        <audio id="backgroundAudio" preload="auto">
            <source src="audio.mp3" type="audio/mpeg">
        </audio>
        <div class="glass-box">
            <h1>erased</h1>
            <img src="vee.jpg" alt="Profile Picture">
            <div class="spacer"></div>
            <div class="icons">
                <div class="icon-container">
                    <i class="fas fa-crown"></i>
                    <span class="icon-text">@owner</span>
                </div>
                <div class="icon-container">
                    <i class="fas fa-code"></i>
                    <span class="icon-text">@dev</span>
                </div>
            </div>
            <div class="spacer"></div>
            <div id="footer">
                <span id="typing-text" class="typewriter"></span>
            </div>
            <div class="smallspacer"></div>
            <div class="infobox">
                <a href="https://discord.gg/76ZaKYeu7W">
                    <button class="tooltip-button">
                        <i class="fab fa-discord icon-icons"></i>
                        <span class="button-tooltip">discord</span>
                    </button>
                </a>
                <a href="https://e-z.bio/cope">
                    <button class="tooltip-button">
                        <i class="fas fa-globe icon-icons" aria-hidden="true"></i>
                        <span class="button-tooltip">ez bio</span>
                    </button>
                </a>
            </div>
        </div>
</body>

</html>
